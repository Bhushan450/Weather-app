<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌤 Weather App</h1>

        <div class="search-box">
            <input
                type="text"
                id="city"
                placeholder="Enter city name..."
            >

            <button id="searchBtn">
                Search
            </button>
        </div>

        <div id="weatherCard" class="weather-card">

            <h2 id="cityName">City</h2>

            <img
                id="weatherIcon"
                src=""
                alt="Weather Icon"
            >

            <h1 id="temperature">--°C</h1>

            <p id="condition">
                Weather Condition
            </p>

            <div class="details">

                <div class="detail-box">
                    <h3>Humidity</h3>
                    <p id="humidity">--%</p>
                </div>

                <div class="detail-box">
                    <h3>Wind</h3>
                    <p id="wind">-- km/h</p>
                </div>

                <div class="detail-box">
                    <h3>Feels Like</h3>
                    <p id="feelsLike">--°C</p>
                </div>

                <div class="detail-box">
                    <h3>Pressure</h3>
                    <p id="pressure">----</p>
                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
